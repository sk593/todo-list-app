# This workflow is auto-generated by Radius to build the application graph.
name: Build Application Graph

on:
  push:
    branches: [main]
    paths: [app.bicep, .radius/app.bicep]
  pull_request:
    paths: [app.bicep, .radius/app.bicep]

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      app_file: ${{ steps.find.outputs.app_file }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          if [ -f ".radius/app.bicep" ]; then
            echo "app_file=.radius/app.bicep" >> $GITHUB_OUTPUT
          else
            echo "app_file=app.bicep" >> $GITHUB_OUTPUT
          fi

  build-graph:
    needs: detect
    uses: radius-project/radius/.github/workflows/__build-app-graph.yml@brooke-hamilton/merge-oidc-branch
    with:
      app_file: ${{ needs.detect.outputs.app_file }}
      orphan_branch: radius-graph
      workflow_source_ref: brooke-hamilton/merge-oidc-branch
