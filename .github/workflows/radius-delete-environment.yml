# This workflow is auto-generated by Radius. It deletes a Radius environment.
# Like the deploy path, deletion runs against an ephemeral k3d control plane: the
# reusable run-rad-commands-<provider> workflow restores the persisted Radius
# state onto the k3d cluster, runs the requested `rad env delete`, then persists
# the updated state again and tears the cluster down. This dispatcher only
# detects whether the selected GitHub Environment is wired for Azure or AWS,
# builds the delete command, and calls the matching reusable workflow. It mirrors
# run-rad-commands.yml so deletion reuses the exact same state pull/store
# machinery as deploy.
#
# NOTE: the reusable workflow (re)creates the environment and recipe pack before
# running the delete command, so the environment is ensured-then-deleted in a
# single run. Delete the applications in the environment first — `rad env delete`
# will fail if the environment still contains deployed applications.
name: Radius - Delete Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name (the Radius environment of the same name is deleted)'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  # Bind to the GitHub Environment so environment-scoped variables are visible,
  # pick the provider from whichever identifying variable is set, and build the
  # `rad env delete` command. A job that calls a reusable workflow (`uses:`) can't
  # bind an environment itself, so this routing decision has to happen in a
  # regular job first.
  detect:
    name: Detect provider
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      provider: ${{ steps.detect.outputs.provider }}
      rad_commands: ${{ steps.command.outputs.rad_commands }}
    steps:
      - name: Determine provider from environment variables
        id: detect
        run: |
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "provider=azure" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "provider=aws" >> "$GITHUB_OUTPUT"
          else
            echo "No AZURE_CLIENT_ID or AWS_ROLE_ARN set on this environment." >&2
            echo "provider=none" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Build delete command
        id: command
        env:
          ENV_NAME: ${{ inputs.environment || 'dev' }}
        run: |
          # The reusable workflow creates the Radius environment named after the
          # GitHub Environment (ENVIRONMENT=inputs.environment), so the same name
          # is the one to delete. `--yes` skips the interactive confirmation.
          echo "Deleting environment: $ENV_NAME"
          echo "rad_commands=env delete $ENV_NAME --yes" >> "$GITHUB_OUTPUT"

  azure:
    name: Azure
    needs: detect
    if: ${{ needs.detect.outputs.provider == 'azure' }}
    uses: ./.github/workflows/run-rad-commands-azure.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      rad_commands: ${{ needs.detect.outputs.rad_commands }}
    secrets: inherit

  aws:
    name: AWS
    needs: detect
    if: ${{ needs.detect.outputs.provider == 'aws' }}
    uses: ./.github/workflows/run-rad-commands-aws.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      rad_commands: ${{ needs.detect.outputs.rad_commands }}
    secrets: inherit
