# This workflow is auto-generated by Radius to verify cloud credentials.
name: Radius - Verify Cloud Credentials

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: write
  pages: write

jobs:
  verify:
    name: Verify cloud credentials
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure access
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          set -euo pipefail
          echo "Verifying Azure access..."
          az account show --query '{name:name, state:state}' --output table
          echo ""
          echo "✅ Azure credentials are working correctly."

      - name: Configure AWS Credentials (OIDC)
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS access
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        run: |
          set -euo pipefail
          echo "Verifying AWS access..."
          CALLER_ARN=$(aws sts get-caller-identity --query 'Arn' --output text)
          echo "${CALLER_ARN}" | sed 's/[0-9]\{12\}/****/g'
          echo ""
          echo "✅ AWS credentials are working correctly."

      - name: Discover AWS resources
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        run: |
          set -euo pipefail
          REGION="${{ vars.AWS_REGION }}"
          CLUSTERS=$(aws eks list-clusters --region "$REGION" --query 'clusters' --output json 2>/dev/null || echo '[]')
          VPCS=$(aws ec2 describe-vpcs --region "$REGION" --query 'Vpcs[].{id:VpcId,name:Tags[?Key==`Name`].Value|[0],isDefault:IsDefault}' --output json 2>/dev/null || echo '[]')
          SUBNETS=$(aws ec2 describe-subnets --region "$REGION" --query 'Subnets[].{id:SubnetId,vpcId:VpcId,az:AvailabilityZone,name:Tags[?Key==`Name`].Value|[0]}' --output json 2>/dev/null || echo '[]')
          printf '{"eksClusters":%s,"vpcs":%s,"subnets":%s}' "$CLUSTERS" "$VPCS" "$SUBNETS" > /tmp/radius-discovery.json

      - name: Upload discovery data
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: radius-discovery
          path: /tmp/radius-discovery.json
          retention-days: 1

      - name: Discover Azure resources
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          set -euo pipefail
          SUB="${{ vars.AZURE_SUBSCRIPTION_ID }}"
          RESOURCE_GROUPS=$(az group list --subscription "$SUB" --query '[].{name:name, location:location}' --output json 2>/dev/null || echo '[]')
          AKS_CLUSTERS=$(az aks list --subscription "$SUB" --query '[].{name:name, resourceGroup:resourceGroup, location:location}' --output json 2>/dev/null || echo '[]')
          LOCATIONS=$(az account list-locations --query "[?metadata.regionType=='Physical'].{name:name, displayName:displayName}" --output json 2>/dev/null || echo '[]')
          printf '{"resourceGroups":%s,"aksClusters":%s,"locations":%s}' "$RESOURCE_GROUPS" "$AKS_CLUSTERS" "$LOCATIONS" > /tmp/radius-discovery.json

      - name: Upload Azure discovery data
        if: ${{ vars.AZURE_CLIENT_ID != '' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: radius-discovery
          path: /tmp/radius-discovery.json
          retention-days: 1

      # ─── OIDC Issuer Setup (one-time, idempotent) ───

      - name: Generate OIDC signing key
        run: |
          set -euo pipefail
          # Check if key already exists by testing if the variable is set.
          # If so, skip generation.
          if [ -n "${{ vars.RADIUS_OIDC_ISSUER }}" ]; then
            echo "OIDC issuer already configured, skipping key generation."
            exit 0
          fi

          echo "Generating RSA 2048 signing key for k3d OIDC issuer..."
          openssl genrsa -out /tmp/sa.key 2048
          openssl rsa -in /tmp/sa.key -pubout -out /tmp/sa.pub

          # Store private key as repo secret via GitHub API.
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          # Get the repo public key for secret encryption.
          PUB_KEY_RESP=$(curl -sS -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$OWNER/$REPO/actions/secrets/public-key")
          PUB_KEY=$(echo "$PUB_KEY_RESP" | jq -r .key)
          PUB_KEY_ID=$(echo "$PUB_KEY_RESP" | jq -r .key_id)

          # Encrypt and upload the private key.
          pip install pynacl --quiet
          ENCRYPTED=$(python3 -c "
          import base64, sys
          from nacl import encoding, public
          pub_key = base64.b64decode('$PUB_KEY')
          sealed = public.SealedBox(public.PublicKey(pub_key)).encrypt(open('/tmp/sa.key','rb').read())
          print(base64.b64encode(sealed).decode())
          ")

          curl -sS -X PUT -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$OWNER/$REPO/actions/secrets/RADIUS_OIDC_PRIVATE_KEY" \
            -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$PUB_KEY_ID\"}"
          echo "✅ RADIUS_OIDC_PRIVATE_KEY secret stored."

      - name: Publish OIDC discovery document
        run: |
          set -euo pipefail
          if [ -n "${{ vars.RADIUS_OIDC_ISSUER }}" ]; then
            echo "OIDC issuer already published, skipping."
            exit 0
          fi

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          ISSUER_URL="https://$OWNER.github.io/$REPO"

          # Compute JWK from public key.
          python3 -c "
          import json, base64, struct
          from cryptography.hazmat.primitives.serialization import load_pem_public_key
          from cryptography.hazmat.primitives.asymmetric.rsa import RSAPublicNumbers
          import hashlib

          with open('/tmp/sa.pub', 'rb') as f:
              pub = load_pem_public_key(f.read())
          nums = pub.public_numbers()

          def b64url(data):
              return base64.urlsafe_b64encode(data).rstrip(b'=').decode()

          n_bytes = nums.n.to_bytes((nums.n.bit_length() + 7) // 8, 'big')
          e_bytes = nums.e.to_bytes((nums.e.bit_length() + 7) // 8, 'big')
          kid = hashlib.sha256(n_bytes).hexdigest()[:16]

          jwk = {
              'kty': 'RSA',
              'use': 'sig',
              'alg': 'RS256',
              'kid': kid,
              'n': b64url(n_bytes),
              'e': b64url(e_bytes),
          }

          # Write discovery document
          import os
          os.makedirs('/tmp/oidc/.well-known', exist_ok=True)
          os.makedirs('/tmp/oidc/openid/v1', exist_ok=True)

          discovery = {
              'issuer': '$ISSUER_URL',
              'jwks_uri': '$ISSUER_URL/openid/v1/jwks',
              'response_types_supported': ['id_token'],
              'subject_types_supported': ['public'],
              'id_token_signing_alg_values_supported': ['RS256'],
          }
          with open('/tmp/oidc/.well-known/openid-configuration', 'w') as f:
              json.dump(discovery, f, indent=2)

          jwks = {'keys': [jwk]}
          with open('/tmp/oidc/openid/v1/jwks', 'w') as f:
              json.dump(jwks, f, indent=2)
          "
          echo "✅ OIDC documents generated."

          # Push to orphan branch radius-oidc-issuer.
          cd /tmp/oidc
          git init
          git checkout --orphan radius-oidc-issuer
          git add .
          git commit -m "radius: publish OIDC issuer documents"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$OWNER/$REPO.git"
          git push origin radius-oidc-issuer --force

          # Enable GitHub Pages on this branch.
          curl -sS -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$OWNER/$REPO/pages" \
            -d '{"source":{"branch":"radius-oidc-issuer","path":"/"}}' || \
          curl -sS -X PUT -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$OWNER/$REPO/pages" \
            -d '{"source":{"branch":"radius-oidc-issuer","path":"/"}}'

          # Set the issuer URL as a repo variable.
          curl -sS -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$OWNER/$REPO/actions/variables" \
            -d "{\"name\":\"RADIUS_OIDC_ISSUER\",\"value\":\"$ISSUER_URL\"}" || \
          curl -sS -X PATCH -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$OWNER/$REPO/actions/variables/RADIUS_OIDC_ISSUER" \
            -d "{\"value\":\"$ISSUER_URL\"}"

          echo "✅ OIDC issuer published at $ISSUER_URL"

      - name: Register OIDC issuer with Azure (federated credentials)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          set -euo pipefail
          if [ -n "${{ vars.RADIUS_OIDC_ISSUER }}" ]; then
            ISSUER="${{ vars.RADIUS_OIDC_ISSUER }}"
          else
            OWNER="${{ github.repository_owner }}"
            REPO="${{ github.event.repository.name }}"
            ISSUER="https://$OWNER.github.io/$REPO"
          fi

          CLIENT_ID="${{ vars.AZURE_CLIENT_ID }}"
          APP_OBJECT_ID=$(az ad app show --id "$CLIENT_ID" --query id -o tsv)

          for SA in dynamic-rp applications-rp ucp; do
            SUBJECT="system:serviceaccount:radius-system:$SA"
            NAME="radius-k3d-$SA"
            echo "Adding federated credential: $NAME (subject=$SUBJECT)"
            az ad app federated-credential create --id "$APP_OBJECT_ID" --parameters "{
              \"name\": \"$NAME\",
              \"issuer\": \"$ISSUER\",
              \"subject\": \"$SUBJECT\",
              \"audiences\": [\"api://AzureADTokenExchange\"],
              \"description\": \"Radius k3d OIDC for $SA\"
            }" 2>/dev/null || echo "  (already exists)"
          done
          echo "✅ Azure federated credentials registered."

      - name: Register OIDC issuer with AWS (IAM OIDC provider)
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        run: |
          set -euo pipefail
          if [ -n "${{ vars.RADIUS_OIDC_ISSUER }}" ]; then
            ISSUER="${{ vars.RADIUS_OIDC_ISSUER }}"
          else
            OWNER="${{ github.repository_owner }}"
            REPO="${{ github.event.repository.name }}"
            ISSUER="https://$OWNER.github.io/$REPO"
          fi

          # Strip https:// for IAM provider URL format.
          ISSUER_HOST="${ISSUER#https://}"
          ACCOUNT_ID="${{ vars.AWS_ACCOUNT_ID }}"
          ROLE_ARN="${{ vars.AWS_IAM_ROLE_ARN }}"
          REGION="${{ vars.AWS_REGION }}"

          # Create the OIDC provider (idempotent — errors if exists).
          THUMBPRINT=$(echo | openssl s_client -servername "$ISSUER_HOST" -connect "$ISSUER_HOST:443" 2>/dev/null | openssl x509 -fingerprint -noout 2>/dev/null | sed 's/.*=//;s/://g' | tr 'A-F' 'a-f')
          aws iam create-open-id-connect-provider \
            --url "$ISSUER" \
            --client-id-list sts.amazonaws.com \
            --thumbprint-list "$THUMBPRINT" \
            --region "$REGION" 2>/dev/null || echo "OIDC provider already exists"

          # Update the deploy role's trust policy to include k3d SA subjects.
          PROVIDER_ARN="arn:aws:iam::$ACCOUNT_ID:oidc-provider/$ISSUER_HOST"
          CURRENT_POLICY=$(aws iam get-role --role-name "$(echo $ROLE_ARN | awk -F/ '{print $NF}')" --query 'Role.AssumeRolePolicyDocument' --output json)

          # Add a new statement for the k3d OIDC provider if not already present.
          if ! echo "$CURRENT_POLICY" | grep -q "$ISSUER_HOST"; then
            NEW_STATEMENT='{
              "Effect": "Allow",
              "Principal": {"Federated": "'"$PROVIDER_ARN"'"},
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "'"$ISSUER_HOST"':aud": "sts.amazonaws.com"
                },
                "StringLike": {
                  "'"$ISSUER_HOST"':sub": "system:serviceaccount:radius-system:*"
                }
              }
            }'
            UPDATED_POLICY=$(echo "$CURRENT_POLICY" | jq ".Statement += [$NEW_STATEMENT]")
            ROLE_NAME=$(echo "$ROLE_ARN" | awk -F/ '{print $NF}')
            aws iam update-assume-role-policy --role-name "$ROLE_NAME" --policy-document "$UPDATED_POLICY"
            echo "✅ IAM role trust policy updated for k3d OIDC."
          else
            echo "IAM trust policy already includes k3d OIDC issuer."
          fi
