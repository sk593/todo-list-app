# This workflow is auto-generated by Radius to verify cloud credentials.
name: Radius - Verify Cloud Credentials

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read

jobs:
  verify:
    name: Verify cloud credentials
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure environment values
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          GITHUB_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          for value in "$AZURE_CLIENT_ID" "$AZURE_TENANT_ID" "$AZURE_SUBSCRIPTION_ID"; do
            echo "::add-mask::$value"
          done

          missing=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is empty for environment $GITHUB_ENVIRONMENT"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          echo "GitHub environment: $GITHUB_ENVIRONMENT"
          echo "AZURE_CLIENT_ID length: ${#AZURE_CLIENT_ID}, suffix: ${AZURE_CLIENT_ID: -6}"
          echo "AZURE_TENANT_ID length: ${#AZURE_TENANT_ID}, suffix: ${AZURE_TENANT_ID: -6}"
          echo "AZURE_SUBSCRIPTION_ID length: ${#AZURE_SUBSCRIPTION_ID}, suffix: ${AZURE_SUBSCRIPTION_ID: -6}"

      - name: Azure Login (OIDC)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Verify Azure access
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          set -euo pipefail
          echo "Verifying Azure access..."
          if ! az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"; then
            echo "::error::OIDC login succeeded, but the principal cannot access subscription ${{ vars.AZURE_SUBSCRIPTION_ID }}. Check the subscription ID and Azure role assignments for the federated credential."
            exit 1
          fi
          az account show --query '{name:name, id:id, tenantId:tenantId, state:state}' --output table
          echo ""
          echo "✅ Azure credentials are working correctly."

      - name: Configure AWS Credentials (OIDC)
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS access
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        run: |
          set -euo pipefail
          echo "Verifying AWS access..."
          CALLER_ARN=$(aws sts get-caller-identity --query 'Arn' --output text)
          echo "${CALLER_ARN}" | sed 's/[0-9]\{12\}/****/g'
          echo ""
          echo "✅ AWS credentials are working correctly."

      - name: Discover AWS resources
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        run: |
          set -euo pipefail
          REGION="${{ vars.AWS_REGION }}"
          CLUSTERS=$(aws eks list-clusters --region "$REGION" --query 'clusters' --output json 2>/dev/null || echo '[]')
          VPCS=$(aws ec2 describe-vpcs --region "$REGION" --query 'Vpcs[].{id:VpcId,name:Tags[?Key==`Name`].Value|[0],isDefault:IsDefault}' --output json 2>/dev/null || echo '[]')
          SUBNETS=$(aws ec2 describe-subnets --region "$REGION" --query 'Subnets[].{id:SubnetId,vpcId:VpcId,az:AvailabilityZone,name:Tags[?Key==`Name`].Value|[0]}' --output json 2>/dev/null || echo '[]')
          printf '{"eksClusters":%s,"vpcs":%s,"subnets":%s}' "$CLUSTERS" "$VPCS" "$SUBNETS" > /tmp/radius-discovery.json

      - name: Upload discovery data
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: radius-discovery
          path: /tmp/radius-discovery.json
          retention-days: 1
