# This workflow is auto-generated by Radius. It deletes a deployed Radius
# application. Like the deploy path, deletion runs against an ephemeral k3d
# control plane: the reusable run-rad-commands-<provider> workflow restores the
# persisted Radius state onto the k3d cluster, runs the requested `rad app
# delete`, then persists the updated state again and tears the cluster down. This
# dispatcher only detects whether the selected GitHub Environment is wired for
# Azure or AWS, builds the delete command, and calls the matching reusable
# workflow. It mirrors run-rad-commands.yml so deletion reuses the exact same
# state pull/store machinery as deploy.
name: Radius - Delete Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name'
        required: true
        default: 'dev'
      application:
        description: 'Radius application name to delete (defaults to the app name in .radius/app.bicep)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  # Bind to the GitHub Environment so environment-scoped variables are visible,
  # pick the provider from whichever identifying variable is set, and resolve the
  # application name into a `rad app delete` command. A job that calls a reusable
  # workflow (`uses:`) can't bind an environment itself, so this routing decision
  # has to happen in a regular job first.
  detect:
    name: Detect provider
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      provider: ${{ steps.detect.outputs.provider }}
      rad_commands: ${{ steps.command.outputs.rad_commands }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine provider from environment variables
        id: detect
        run: |
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "provider=azure" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "provider=aws" >> "$GITHUB_OUTPUT"
          else
            echo "No AZURE_CLIENT_ID or AWS_ROLE_ARN set on this environment." >&2
            echo "provider=none" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Build delete command
        id: command
        env:
          APP_INPUT: ${{ inputs.application }}
        run: |
          # Use the explicit input when provided, otherwise fall back to the
          # application resource name declared in .radius/app.bicep (the first
          # `name:` field, matching how the run-rad-commands action derives it).
          APP="$APP_INPUT"
          if [ -z "${APP//[[:space:]]/}" ]; then
            APP=$(grep -oP "name:\s*'\K[^']+" ".radius/app.bicep" 2>/dev/null | head -1)
          fi
          if [ -z "${APP//[[:space:]]/}" ]; then
            echo "Could not determine the application name. Provide the 'application' input or ensure .radius/app.bicep defines one." >&2
            exit 1
          fi
          echo "Deleting application: $APP"
          # `--yes` skips the interactive confirmation. The command string is split
          # on whitespace by the run-rad-commands action, so the name must not
          # contain spaces (Radius application names never do).
          echo "rad_commands=app delete $APP --yes" >> "$GITHUB_OUTPUT"

  azure:
    name: Azure
    needs: detect
    if: ${{ needs.detect.outputs.provider == 'azure' }}
    uses: ./.github/workflows/run-rad-commands-azure.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      rad_commands: ${{ needs.detect.outputs.rad_commands }}
    secrets: inherit

  aws:
    name: AWS
    needs: detect
    if: ${{ needs.detect.outputs.provider == 'aws' }}
    uses: ./.github/workflows/run-rad-commands-aws.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      rad_commands: ${{ needs.detect.outputs.rad_commands }}
    secrets: inherit
